<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#06CDE1"/>
      <stop offset="54%"  stop-color="#BA0DA7"/>
      <stop offset="100%" stop-color="#FF7512"/>
    </linearGradient>
    <linearGradient id="og2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#06CDE1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#BA0DA7" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- outer ring -->
  <circle cx="24" cy="24" r="22" stroke="url(#og)" stroke-width="2.5" fill="url(#og2)"/>
  <!-- inner O shape -->
  <circle cx="24" cy="24" r="11" stroke="url(#og)" stroke-width="3" fill="none"/>
  <!-- diagonal slash — the K stroke -->
  <line x1="29" y1="13" x2="19" y2="35" stroke="url(#og)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
